<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Matern Link - Seguranca QR Code</title>
  <link rel="stylesheet" href="style-acesso.css">
</head>
<body>
  <div class="card-acesso">
    <h2>Validacao de Seguranca</h2>
    <p style="color: #94a3b8; font-size: 13px;">Aproxime o dispositivo ou clique no QR Code abaixo para simular a leitura fisica do prontuario da gestante.</p>

    <div class="qr-placeholder" onclick="desbloquearProntuario()" style="cursor: pointer;">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=MaternLinkAcessoAutorizado" alt="QR Code">
    </div>

    <span style="font-size: 11px; color: #ef4444; display: block; margin-top: 10px;">
      Simulacao: Clique no codigo QR para liberar o sistema
    </span>
  </div>

  <script>
    function desbloquearProntuario() {
      const urlParams = new URLSearchParams(window.location.search);
      const pacienteId = urlParams.get('paciente_id') || sessionStorage.getItem('paciente_id') || 1;
      window.location.href = 'index.html?paciente_id=' + pacienteId;
    }
  </script>
</body>
</html>
